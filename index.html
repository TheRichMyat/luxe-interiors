<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxe Interiors | Premium Renovation & Design</title>
  <link rel="stylesheet" href="/src/index.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="bg-stone-50 text-stone-900 font-sans">
  <!-- Navigation -->
  <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-stone-200">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <div class="text-2xl font-serif tracking-tighter font-bold">LUXE<span class="text-emerald-700">.</span></div>
      <div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest font-medium">
        <a href="#home" class="hover:text-emerald-700 transition-colors">Home</a>
        <a href="#about" class="hover:text-emerald-700 transition-colors">About</a>
        <a href="#services" class="hover:text-emerald-700 transition-colors">Services</a>
        <a href="#portfolio" class="hover:text-emerald-700 transition-colors">Portfolio</a>
        <a href="#contact" class="hover:text-emerald-700 transition-colors">Contact</a>
      </div>
  </nav>

  <!-- Hero Section -->
  <section id="home" class="relative h-screen flex items-center pt-20 overflow-hidden">
    <div class="absolute inset-0 z-0">
      <img id="hero-image" src="" alt="Hero" class="w-full h-full object-cover scale-105 transition-transform duration-1000" referrerPolicy="no-referrer">
      <!-- Dark Overlay -->
      <div class="absolute inset-0 bg-black/60 z-10"></div>
    </div>
    <div class="relative z-20 max-w-7xl mx-auto px-6 w-full">
      <div class="max-w-2xl">
        <h1 id="hero-title" class="text-5xl md:text-7xl font-serif text-white leading-tight mb-6 opacity-0 translate-y-4 transition-all duration-700 delay-100 drop-shadow-lg"></h1>
        <p id="hero-description" class="text-stone-200 text-lg mb-8 max-w-lg opacity-0 translate-y-4 transition-all duration-700 delay-200 drop-shadow-md"></p>
        <div class="flex space-x-4 opacity-0 translate-y-4 transition-all duration-700 delay-300">
          <a id="hero-cta" href="#portfolio" class="bg-emerald-600 text-white px-10 py-5 uppercase tracking-widest text-sm font-bold rounded-sm hover:bg-emerald-500 hover:scale-105 transition-all inline-block shadow-xl"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- Stats Section -->
  <section class="bg-white py-20 border-b border-stone-100">
    <div class="max-w-7xl mx-auto px-6">
      <div id="stats-container" class="grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
        <!-- Stats will be injected here -->
      </div>
    </div>
  </section>

  <!-- About Section -->
  <section id="about" class="py-24 bg-stone-50">
    <div class="max-w-7xl mx-auto px-6">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
        <div class="relative">
          <div class="aspect-[4/5] overflow-hidden rounded-2xl">
            <img id="about-image" src="" alt="About Us" class="w-full h-full object-cover" referrerPolicy="no-referrer">
          </div>
          <div class="absolute -bottom-8 -right-8 bg-emerald-600 text-white p-10 rounded-2xl hidden lg:block">
            <p class="text-4xl font-serif font-bold mb-1">12+</p>
            <p class="text-xs uppercase tracking-widest">Years of Excellence</p>
          </div>
        </div>
        <div>
          <h2 id="about-title" class="text-4xl font-serif mb-8"></h2>
          <p id="about-description" class="text-stone-600 text-lg leading-relaxed mb-8"></p>
          <div class="bg-white p-8 border-l-4 border-emerald-600 shadow-sm">
            <p class="text-stone-400 uppercase tracking-widest text-xs font-bold mb-2">Our Mission</p>
            <p id="about-mission" class="text-stone-800 italic text-lg"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Services Section -->
  <section id="services" class="py-24 bg-white">
    <div class="max-w-7xl mx-auto px-6">
      <div class="text-center max-w-2xl mx-auto mb-16">
        <h2 id="services-title" class="text-4xl font-serif mb-4"></h2>
        <div class="h-1 w-20 bg-emerald-600 mx-auto"></div>
      </div>
      <div id="services-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        <!-- Services will be injected here -->
      </div>
    </div>
  </section>

  <!-- Portfolio Section -->
  <section id="portfolio" class="py-24 bg-stone-900 text-white">
    <div class="max-w-7xl mx-auto px-6">
      <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-6">
        <div class="max-w-xl">
          <h2 class="text-4xl font-serif mb-4">Our Portfolio</h2>
          <p class="text-stone-400">A showcase of our most recent transformations and design achievements.</p>
        </div>
      </div>
      <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Portfolio items will be injected here -->
      </div>
    </div>
  </section>

  <!-- Portfolio Modal -->
  <div id="portfolio-modal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" id="modal-overlay"></div>
    <div class="relative z-10 w-full h-full flex items-center justify-center p-4 md:p-8">
      <div class="bg-white text-stone-900 w-full max-w-5xl max-h-[90vh] overflow-y-auto rounded-xl shadow-2xl relative scale-95 transition-transform duration-300" id="modal-content">
        <button id="close-modal" class="absolute top-6 right-6 text-stone-400 hover:text-stone-900 transition-colors z-20">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        
        <div class="grid grid-cols-1 lg:grid-cols-2">
          <div class="p-8 md:p-12">
            <h2 id="modal-title" class="text-3xl md:text-4xl font-serif mb-6"></h2>
            <div class="flex flex-wrap gap-6 mb-8 text-sm uppercase tracking-widest font-bold">
              <div>
                <p class="text-emerald-600 mb-1">Client</p>
                <p id="modal-client" class="text-stone-900"></p>
              </div>
              <div>
                <p class="text-emerald-600 mb-1">Location</p>
                <p id="modal-location" class="text-stone-900"></p>
              </div>
              <div>
                <p class="text-emerald-600 mb-1">Year</p>
                <p id="modal-year" class="text-stone-900"></p>
              </div>
              <div>
                <p class="text-emerald-600 mb-1">Price</p>
                <p id="modal-price" class="text-stone-900"></p>
              </div>
            </div>
            <div class="prose prose-stone max-w-none">
              <p id="modal-description" class="text-stone-600 leading-relaxed text-lg"></p>
            </div>
          </div>
          <div class="bg-stone-100 p-8 md:p-12">
            <div id="modal-gallery" class="grid grid-cols-1 gap-6">
              <!-- Gallery images will be injected here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Contact Section -->
  <section id="contact" class="py-24 bg-white">
    <div class="max-w-7xl mx-auto px-6">
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
        <div>
          <h2 id="contact-title" class="text-4xl font-serif mb-8"></h2>
          <div class="space-y-8">
            <div class="flex items-start space-x-6">
              <div class="bg-stone-100 p-4 rounded-lg">
                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
              </div>
              <div>
                <p class="text-xs uppercase tracking-widest text-stone-400 font-bold mb-1">Email Us</p>
                <p id="contact-email" class="text-lg text-stone-800"></p>
              </div>
            </div>
            <div class="flex items-start space-x-6">
              <div class="bg-stone-100 p-4 rounded-lg">
                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
              </div>
              <div>
                <p class="text-xs uppercase tracking-widest text-stone-400 font-bold mb-1">Call Us</p>
                <p id="contact-phone" class="text-lg text-stone-800"></p>
              </div>
            </div>
            <div class="flex items-start space-x-6">
              <div class="bg-stone-100 p-4 rounded-lg">
                <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
              </div>
              <div>
                <p class="text-xs uppercase tracking-widest text-stone-400 font-bold mb-1">Visit Us</p>
                <p id="contact-address" class="text-lg text-stone-800"></p>
              </div>
            </div>
          </div>
        </div>
        <div class="bg-stone-50 p-10 rounded-2xl border border-stone-200">
          <form class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-xs uppercase tracking-widest font-bold mb-2">Name</label>
                <input type="text" class="w-full bg-white border border-stone-200 px-4 py-3 focus:outline-none focus:border-emerald-600 transition-colors">
              </div>
              <div>
                <label class="block text-xs uppercase tracking-widest font-bold mb-2">Email</label>
                <input type="email" class="w-full bg-white border border-stone-200 px-4 py-3 focus:outline-none focus:border-emerald-600 transition-colors">
              </div>
            </div>
            <div>
              <label class="block text-xs uppercase tracking-widest font-bold mb-2">Message</label>
              <textarea rows="4" class="w-full bg-white border border-stone-200 px-4 py-3 focus:outline-none focus:border-emerald-600 transition-colors"></textarea>
            </div>
            <button type="submit" class="w-full bg-stone-900 text-white py-4 uppercase tracking-widest text-sm font-bold hover:bg-stone-800 transition-all">Send Message</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <footer class="bg-stone-900 text-white py-12 border-t border-stone-800">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">
      <div class="text-2xl font-serif font-bold">LUXE<span class="text-emerald-700">.</span></div>
      <div id="footer-socials" class="flex space-x-8 text-stone-400 text-sm uppercase tracking-widest">
        <!-- Socials will be injected here -->
      </div>
      <p class="text-stone-500 text-xs uppercase tracking-widest">© 2026 Luxe Interiors. All rights reserved.</p>
    </div>
  </footer>

  <script type="module" src="/src/main.ts"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
